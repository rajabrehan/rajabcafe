<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rajab's Condo Cafe — a cozy home cafe for handcrafted drinks."
    />
    <title>Rajab's Condo Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/home.css" />
  </head>
  <body class="home-page">
    <div class="hero-bg" role="img" aria-label="Cozy home cafe setup with warm lighting"></div>
    <div class="hero-overlay"></div>

    <main class="hero-content">
      <header class="hero-header">
        <span class="hero-badge" aria-hidden="true">☕</span>
        <h1>Rajab's Condo Cafe</h1>
        <p class="hero-tagline">Handcrafted drinks, served fresh by order</p>
      </header>
    </main>

    <footer class="hero-footer">
      <a class="btn-enter-menu" href="menu.html">Enter Menu</a>
    </footer>

    <div class="page-fade-overlay" aria-hidden="true"></div>

    <script>
      const enterBtn = document.querySelector(".btn-enter-menu");
      enterBtn.addEventListener("click", (e) => {
        e.preventDefault();
        const destination = enterBtn.getAttribute("href");
        document.body.classList.add("is-leaving");
        setTimeout(() => {
          window.location.href = destination;
        }, 550);
      });
    </script>
  </body>
</html>
